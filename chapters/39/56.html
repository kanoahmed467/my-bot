            <style>
                :root {
                    --bg-main: #0f141e;
                    --bg-card: rgba(26, 34, 53, 0.85);
                    --c-purple: #a855f7;
                    --text-main: #ffffff;
                }
                * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
                body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; align-items: center; }

                /* شريط التمرير (Scrollbar) */
                ::-webkit-scrollbar { width: 8px; }
                ::-webkit-scrollbar-track { background: var(--bg-main); }
                ::-webkit-scrollbar-thumb { background: var(--c-purple); border-radius: 10px; }

                /* الهيدر الزجاجي */
                .top-bar {
                    position: fixed; top: 0; width: 100%; z-index: 1000;
                    background: var(--bg-card); backdrop-filter: blur(15px);
                    border-bottom: 1px solid rgba(168, 85, 247, 0.3);
                    display: flex; justify-content: space-between; align-items: center;
                    padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
                }
                .title { font-weight: 900; font-size: 16px; display: flex; align-items: center; gap: 8px; }
                .title i { color: var(--c-purple); }

                .actions-btn {
                    background: none; border: none; color: white; font-size: 20px; cursor: pointer; transition: 0.3s;
                }
                .actions-btn:hover { color: var(--c-purple); transform: scale(1.1); }

                /* شريط التقدم */
                .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); position: absolute; bottom: 0; left: 0; }
                .progress-bar { height: 4px; background: var(--c-purple); width: 0%; box-shadow: 0 0 10px var(--c-purple); }

                /* حاوية الصور */
                .reader-container { max-width: 800px; width: 100%; margin-top: 60px; display: flex; flex-direction: column; }

                /* تأثير النبض أثناء التحميل */
                @keyframes pulse {
                    0% { background-color: #1a2235; }
                    50% { background-color: #2d3748; }
                    100% { background-color: #1a2235; }
                }
                .img-wrapper { width: 100%; min-height: 80vh; animation: pulse 1.5s infinite; position: relative; }

                img { 
                    width: 100%; display: block; object-fit: contain; opacity: 0; transition: opacity 0.5s ease;
                }
                img.loaded { opacity: 1; animation: none; }

                /* الفوتر */
                .footer {
                    margin-top: 20px; width: 100%; max-width: 800px; padding: 40px 20px; text-align: center;
                    background: linear-gradient(to top, var(--bg-card), transparent);
                    border-top: 1px solid rgba(168, 85, 247, 0.2);
                }
                .footer h3 { color: var(--c-purple); margin-bottom: 5px; }
                .footer p { font-size: 13px; color: #888; }

                /* زر الرجوع للأعلى */
                #scrollTopBtn {
                    display: none; position: fixed; bottom: 30px; right: 30px; z-index: 99;
                    background: var(--c-purple); color: white; border: none; outline: none;
                    width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
                    font-size: 20px; box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); transition: 0.3s;
                }
                #scrollTopBtn:hover { background: #9333ea; transform: translateY(-3px); }
            </style>

            </button>

            <!-- سكربتات التفاعل -->
            <script>
                // 1. شريط التقدم وزر الصعود
                window.onscroll = function() {
                    let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                    let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                    let scrolled = (winScroll / height) * 100;
                    document.getElementById("myBar").style.width = scrolled + "%";

                    let topBtn = document.getElementById("scrollTopBtn");
                    if (document.body.scrollTop > 500 || document.documentElement.scrollTop > 500) {
                        topBtn.style.display = "block";
                    } else {
                        topBtn.style.display = "none";
                    }
                };

                function scrollToTop() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }

                // 2. وضع ملء الشاشة
                function toggleFullScreen() {
                    let elem = document.documentElement;
                    let icon = document.querySelector('.actions-btn i');

                    if (!document.fullscreenElement) {
                        if (elem.requestFullscreen) { elem.requestFullscreen(); }
                        else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } // Safari
                        else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); } // IE11
                        icon.classList.remove('fa-expand');
                        icon.classList.add('fa-compress');
                    } else {
                        if (document.exitFullscreen) { document.exitFullscreen(); }
                        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                        else if (document.msExitFullscreen) { document.msExitFullscreen(); }
                        icon.classList.remove('fa-compress');
                        icon.classList.add('fa-expand');
                    }
                }
            </script>
