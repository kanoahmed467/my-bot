<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل العمل | VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
    :root {
        --bg: #050505;
        --surface: #111114;
        --primary: #8b5cf6;
        --primary-glow: rgba(139, 92, 246, 0.6);
        --secondary: #ec4899;
        --text: #ffffff;
        --text-dim: #9ca3af;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Cairo', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        overflow-x: hidden;
    }

    /* 🔥 الخلفية البانورامية الضخمة */
    .hero {
        position: relative;
        height: 45vh;
        min-height: 350px;
        width: 100%;
        overflow: hidden;
    }

    .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(8px) brightness(0.4) saturate(1.2);
        transform: scale(1.1);
        transition: transform 0.5s ease;
    }

    /* تدرج لوني للدمج مع الخلفية */
    .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, var(--bg) 0%, transparent 70%, rgba(0,0,0,0.6) 100%);
    }

    /* 🔙 زر الرجوع الفخم */
    .nav-bar {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 10;
    }

    .btn-back {
        background: var(--glass);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        color: var(--text);
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .btn-back:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateX(-5px);
    }

    /* 🧱 الحاوية الرئيسية */
    .main-content {
        position: relative;
        padding: 0 20px 40px;
        margin-top: -120px; /* تداخل احترافي مع البانر */
        z-index: 5;
        max-width: 800px;
        margin-inline: auto;
    }

    /* 🖼 كارت المعلومات العلوي (بوستر + تفاصيل) */
    .info-header {
        display: flex;
        gap: 20px;
        align-items: flex-end;
        margin-bottom: 25px;
    }

    /* البوستر */
    .poster-wrapper {
        flex-shrink: 0;
        position: relative;
        width: 140px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 2px var(--glass-border);
    }

    .poster-wrapper img {
        width: 100%;
        display: block;
        transition: transform 0.3s ease;
    }

    .poster-wrapper:hover img {
        transform: scale(1.05);
    }

    /* التقييم العائم على البوستر */
    .rating-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(4px);
        padding: 4px 8px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
        color: #fbbf24;
        display: flex;
        align-items: center;
        gap: 4px;
        border: 1px solid rgba(251, 191, 36, 0.3);
    }

    /* تفاصيل العنوان */
    .title-block {
        flex-grow: 1;
        padding-bottom: 10px;
    }

    .title {
        font-size: 26px;
        font-weight: 900;
        line-height: 1.2;
        margin-bottom: 8px;
        text-shadow: 0 4px 12px rgba(0,0,0,0.5);
    }

    /* 📚 التصنيفات الجذابة */
    .genres {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 15px;
    }

    .tag {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        color: #e5e7eb;
        backdrop-filter: blur(5px);
        transition: all 0.3s ease;
    }

    .tag:hover {
        background: var(--primary);
        border-color: var(--primary);
        color: white;
    }

    /* 🎯 الزر الأسطوري */
    .action-area {
        margin: 30px 0;
    }

    .btn-read {
        width: 100%;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        border: none;
        padding: 16px;
        border-radius: 14px;
        font-family: 'Cairo', sans-serif;
        font-size: 18px;
        font-weight: 800;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        box-shadow: 0 10px 25px var(--primary-glow);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .btn-read::before {
        content: "";
        position: absolute;
        top: 0; left: -100%;
        width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
        transform: skewX(-20deg);
        transition: all 0.5s;
    }

    .btn-read:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px var(--primary-glow);
    }

    .btn-read:hover::before {
        left: 150%;
    }

    .btn-read svg {
        width: 24px;
        height: 24px;
        fill: currentColor;
    }

    /* 📖 صندوق القصة (الوصف) */
    .desc-box {
        background: var(--surface);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .desc-title {
        font-size: 18px;
        font-weight: 800;
        margin-bottom: 12px;
        color: white;
        display: inline-block;
        border-bottom: 3px solid var(--primary);
        padding-bottom: 4px;
    }

    .desc {
        font-size: 14px;
        line-height: 1.8;
        color: var(--text-dim);
        font-weight: 600;
    }

    /* 🎬 تأثيرات الدخول */
    .fade-up {
        animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        opacity: 0;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* تجاوب مع الشاشات الصغيرة جداً */
    @media (max-width: 380px) {
        .poster-wrapper { width: 110px; }
        .title { font-size: 22px; }
    }
</style>
</head>

<body>

<div class="hero">
    <div class="nav-bar">
        <div class="btn-back" onclick="history.back()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </div>
    </div>
    <img id="bg" alt="Background">
</div>

<div class="main-content">
    
    <div class="info-header fade-up">
        <div class="poster-wrapper">
            <div id="rating-badge" class="rating-badge">
                ★ <span id="rating">0.0</span>
            </div>
            <img id="poster" alt="Poster">
        </div>
        <div class="title-block">
            <h1 id="title" class="title">جاري التحميل...</h1>
        </div>
    </div>

    <div id="genres" class="genres fade-up delay-1">
        </div>

    <div class="action-area fade-up delay-2">
        <button class="btn-read" id="readBtn">
            <svg viewBox="0 0 24 24">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            ابدأ القراءة الآن
        </button>
    </div>

    <div class="desc-box fade-up delay-3">
        <h3 class="desc-title">القصة</h3>
        <p id="desc" class="desc">جاري تحميل تفاصيل العمل...</p>
    </div>

</div>

<script>
let dataAll = [];

async function init(){
    try {
        const res = await fetch('data.json');
        const data = await res.json();
        dataAll = data.mangas;

        const id = new URLSearchParams(location.search).get('id');
        const m = dataAll.find(x => x.id == id);

        if(!m) {
            document.getElementById('title').innerText = "العمل غير متوفر";
            return;
        }

        // تعيين الصور
        document.getElementById('bg').src = m.image_url;
        document.getElementById('poster').src = m.image_url;
        
        // النصوص الأساسية
        document.getElementById('title').innerText = m.title;
        document.getElementById('rating').innerText = m.rating || "N/A";
        document.getElementById('desc').innerText = m.description || "لا يوجد وصف متاح لهذا العمل حالياً.";

        // التصنيفات (مع حماية في حال كانت فارغة)
        if(m.genre) {
            document.getElementById('genres').innerHTML =
                m.genre.split(',').slice(0, 5).map(g => `<span class="tag">${g.trim()}</span>`).join('');
        }

        // زر القراءة
        document.getElementById('readBtn').onclick = () => {
            window.location.href = `https://t.me/${data.bot_username}?start=m${m.id}`;
        };

    } catch (error) {
        console.error("حدث خطأ أثناء جلب البيانات:", error);
        document.getElementById('title').innerText = "حدث خطأ في الاتصال";
    }
}

init();
</script>

</body>
</html>
