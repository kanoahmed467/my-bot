<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل العمل | Ultimate VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --bg-main: #07070a;
        --bg-card: #13131a;
        --primary: #6d28d9;
        --primary-glow: rgba(109, 40, 217, 0.5);
        --accent: #f59e0b; /* لون ذهبي للتقييم */
        --text-main: #ffffff;
        --text-muted: #8b8b99;
        --glass: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

    body {
        background-color: var(--bg-main);
        color: var(--text-main);
        overflow-x: hidden;
    }

    /* 🔥 هيدر شفاف وأزرار علوية */
    .top-nav {
        position: fixed;
        top: 0; width: 100%;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        z-index: 100;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }

    .icon-btn {
        width: 40px; height: 40px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        color: white;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; cursor: pointer;
        transition: 0.3s;
    }
    .icon-btn:hover { background: var(--primary); transform: scale(1.1); }

    /* 🌌 البانر الخلفي */
    .hero-banner {
        position: relative;
        height: 50vh;
        width: 100%;
    }
    .hero-banner img {
        width: 100%; height: 100%;
        object-fit: cover;
        filter: blur(5px) brightness(0.3);
    }
    .hero-banner::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(0deg, var(--bg-main) 0%, transparent 100%);
    }

    /* 🧱 المحتوى الأساسي */
    .content-wrapper {
        position: relative;
        z-index: 10;
        margin-top: -150px;
        padding: 0 20px 40px;
        max-width: 900px;
        margin-inline: auto;
    }

    /* 🖼️ الكارت العلوي (البوستر والتفاصيل) */
    .meta-header {
        display: flex;
        gap: 25px;
        align-items: flex-end;
        margin-bottom: 30px;
    }

    .poster-container {
        flex-shrink: 0;
        width: 160px;
        border-radius: 12px;
        overflow: hidden;
        border: 2px solid var(--border);
        box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px var(--primary-glow);
    }
    .poster-container img { width: 100%; display: block; }

    .meta-info { flex-grow: 1; padding-bottom: 10px; }
    
    .status-badge {
        display: inline-block;
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
        padding: 4px 10px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 800;
        margin-bottom: 10px;
        border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .manga-title {
        font-size: 32px;
        font-weight: 900;
        line-height: 1.2;
        text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    /* 📊 إحصائيات سريعة */
    .quick-stats {
        display: flex; gap: 20px; margin-top: 15px; color: var(--text-muted); font-size: 14px; font-weight: 600;
    }
    .quick-stats i { color: var(--primary); margin-left: 5px; }

    /* ⭐ نظام التقييم التفاعلي */
    .interactive-rating {
        margin-top: 15px;
        display: flex; align-items: center; gap: 10px;
        background: var(--bg-card);
        padding: 10px 15px;
        border-radius: 12px;
        border: 1px solid var(--border);
        width: fit-content;
    }
    .stars { display: flex; flex-direction: row-reverse; gap: 5px; }
    .stars i { color: #333; font-size: 22px; cursor: pointer; transition: 0.2s; }
    .stars i:hover, .stars i:hover ~ i { color: var(--accent); text-shadow: 0 0 10px var(--accent); transform: scale(1.1); }
    .stars i.active { color: var(--accent); }
    .rating-text { font-weight: 800; font-size: 16px; color: var(--accent); }

    /* 🏷️ التصنيفات */
    .tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 25px; }
    .tag {
        background: var(--glass);
        border: 1px solid var(--border);
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 13px; font-weight: 700;
        color: #ddd;
    }

    /* 🎯 أزرار التحكم */
    .action-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 15px;
        margin: 30px 0;
    }

    .btn {
        padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 800;
        cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        border: none; color: white; transition: 0.3s;
    }
    .btn-read {
        background: var(--primary);
        box-shadow: 0 8px 25px var(--primary-glow);
    }
    .btn-read:hover { background: #5b21b6; transform: translateY(-3px); }
    
    .btn-fav { background: var(--glass); border: 1px solid var(--border); }
    .btn-fav:hover { background: rgba(239, 68, 68, 0.2); color: #ef4444; border-color: #ef4444; }

    /* 📖 القصة */
    .section-title {
        font-size: 20px; font-weight: 900; margin-bottom: 15px;
        display: flex; align-items: center; gap: 10px;
    }
    .section-title::before {
        content: ''; width: 4px; height: 20px; background: var(--primary); border-radius: 4px;
    }
    .desc-text {
        color: var(--text-muted); line-height: 1.8; font-size: 15px; font-weight: 600;
        background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border);
    }

    /* 📚 قائمة الفصول (الجديد كلياً) */
    .chapters-section { margin-top: 40px; }
    
    .chapters-list {
        display: flex; flex-direction: column; gap: 10px;
        max-height: 400px; overflow-y: auto; padding-right: 5px;
    }
    
    /* تجميل شريط السكرول */
    .chapters-list::-webkit-scrollbar { width: 6px; }
    .chapters-list::-webkit-scrollbar-track { background: var(--bg-main); }
    .chapters-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    .chapter-card {
        background: var(--glass);
        border: 1px solid var(--border);
        padding: 15px 20px;
        border-radius: 12px;
        display: flex; justify-content: space-between; align-items: center;
        transition: 0.3s; cursor: pointer;
    }
    .chapter-card:hover {
        background: rgba(109, 40, 217, 0.1);
        border-color: var(--primary);
        transform: translateX(-5px);
    }
    .chap-num { font-weight: 800; font-size: 16px; color: white; }
    .chap-date { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .play-icon {
        width: 35px; height: 35px; border-radius: 50%; background: var(--primary);
        display: flex; align-items: center; justify-content: center; color: white;
    }

    /* موبايل */
    @media (max-width: 600px) {
        .meta-header { flex-direction: column; align-items: center; text-align: center; }
        .quick-stats { justify-content: center; }
        .interactive-rating { margin: 15px auto; }
        .tags-container { justify-content: center; }
    }
</style>
</head>
<body>

<nav class="top-nav">
    <div class="icon-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></div>
    <div class="icon-btn" onclick="share()"><i class="fas fa-share-alt"></i></div>
</nav>

<div class="hero-banner">
    <img id="bg" src="" alt="Background">
</div>

<div class="content-wrapper">
    
    <div class="meta-header">
        <div class="poster-container">
            <img id="poster" src="" alt="Poster">
        </div>
        <div class="meta-info">
            <div class="status-badge"><i class="fas fa-bolt"></i> مستمر</div>
            <h1 id="title" class="manga-title">جاري التحميل...</h1>
            
            <div class="quick-stats">
                <span><i class="fas fa-eye"></i> +120K مشاهدة</span>
                <span><i class="fas fa-list"></i> <span id="chapters-count">0</span> فصل</span>
            </div>

            <div class="interactive-rating">
                <span class="rating-text" id="rating-display">0.0</span>
                <div class="stars" id="star-container">
                    </div>
                <span style="font-size: 12px; color: var(--text-muted);">(قيم الآن)</span>
            </div>
        </div>
    </div>

    <div id="genres" class="tags-container"></div>

    <div class="action-grid">
        <button class="btn btn-read" id="readBtn">
            <i class="fas fa-book-open"></i> اقرأ الفصل الأول
        </button>
        <button class="btn btn-fav" onclick="toggleFav(this)">
            <i class="far fa-heart"></i> حفظ
        </button>
    </div>

    <h3 class="section-title">القصة</h3>
    <div class="desc-text" id="desc">...</div>

    <div class="chapters-section">
        <h3 class="section-title">قائمة الفصول</h3>
        <div class="chapters-list" id="chapters-list">
            </div>
    </div>

</div>

<script>
let dataAll = [];

// توليد فصول وهمية عشان نبين "الفخامة"
function generateMockChapters(mangaId) {
    const chaptersContainer = document.getElementById('chapters-list');
    const randomChaptersCount = Math.floor(Math.random() * 20) + 10; // من 10 لـ 30 فصل
    document.getElementById('chapters-count').innerText = randomChaptersCount;
    
    let html = '';
    for(let i = randomChaptersCount; i >= 1; i--) {
        html += `
            <div class="chapter-card" onclick="openChapter(${mangaId}, ${i})">
                <div>
                    <div class="chap-num">الفصل ${i}</div>
                    <div class="chap-date">منذ ${Math.floor(Math.random() * 10) + 1} أيام</div>
                </div>
                <div class="play-icon"><i class="fas fa-play"></i></div>
            </div>
        `;
    }
    chaptersContainer.innerHTML = html;
}

// نظام التقييم التفاعلي
function setupInteractiveRating(initialRating) {
    const container = document.getElementById('star-container');
    const display = document.getElementById('rating-display');
    display.innerText = initialRating;

    let html = '';
    for(let i = 5; i >= 1; i--) {
        // لو التقييم الأساسي أعلى من الرقم ده، خلي النجمة منورة
        const isActive = (initialRating / 2) >= i ? 'active' : ''; 
        html += `<i class="fas fa-star ${isActive}" data-value="${i}" onclick="rateManga(${i})"></i>`;
    }
    container.innerHTML = html;
}

function rateManga(val) {
    const stars = document.querySelectorAll('.stars i');
    const newRating = (val * 2).toFixed(1); // نحولها من 5 لـ 10
    document.getElementById('rating-display').innerText = newRating;
    
    stars.forEach(star => {
        if(star.dataset.value <= val) {
            star.classList.add('active');
            star.style.color = 'var(--accent)';
        } else {
            star.classList.remove('active');
            star.style.color = '#333';
        }
    });
    alert(`تم إرسال تقييمك: ${newRating} بنجاح! شكراً لك.`);
}

// زر المفضلة
function toggleFav(btn) {
    const icon = btn.querySelector('i');
    if(icon.classList.contains('far')) {
        icon.classList.replace('far', 'fas');
        btn.style.color = '#ef4444';
        btn.style.borderColor = '#ef4444';
    } else {
        icon.classList.replace('fas', 'far');
        btn.style.color = 'white';
        btn.style.borderColor = 'var(--border)';
    }
}

// زر المشاركة
function share() {
    if (navigator.share) {
        navigator.share({
            title: document.title,
            url: window.location.href
        });
    } else {
        alert("تم نسخ الرابط!");
    }
}

// فتح الفصل
function openChapter(mangaId, chapterNum) {
    // تقدر تعدل الرابط هنا بناءً على البوت بتاعك
    alert(`جاري توجيهك لقرائة الفصل ${chapterNum}`);
}

async function init(){
    try {
        const res = await fetch('data.json');
        const data = await res.json();
        dataAll = data.mangas;

        const id = new URLSearchParams(location.search).get('id') || dataAll[0]?.id; // لو مفيش id يجيب أول واحد للتجربة
        const m = dataAll.find(x => x.id == id);

        if(!m) {
            document.getElementById('title').innerText = "العمل غير متوفر";
            return;
        }

        // تعبئة البيانات
        document.getElementById('bg').src = m.image_url;
        document.getElementById('poster').src = m.image_url;
        document.getElementById('title').innerText = m.title;
        document.getElementById('desc').innerText = m.description || "لا يوجد وصف حالياً.";

        // التصنيفات
        if(m.genre) {
            document.getElementById('genres').innerHTML =
                m.genre.split(',').map(g => `<span class="tag">${g.trim()}</span>`).join('');
        }

        // تجهيز التقييم التفاعلي والفصول
        setupInteractiveRating(m.rating || "8.5");
        generateMockChapters(m.id);

        // زر القراءة المباشر
        document.getElementById('readBtn').onclick = () => {
            window.location.href = `https://t.me/${data.bot_username}?start=m${m.id}`;
        };

    } catch (error) {
        console.error("خطأ:", error);
    }
}

init();
</script>

</body>
</html>
