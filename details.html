<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل العمل | إحصائياتي ستايل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* الألوان والخطوط الأساسية من صفحة الإحصائيات */
        body.stats-body {
            background-color: #0f141e; /* لون الخلفية الداكن */
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* حاوية الصفحة */
        .stats-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 80px;
            padding-top: 70px; /* مساحة للناف بار العلوي */
            position: relative;
            z-index: 10;
        }

        /* صورة الخلفية المموهة (من صفحة التفاصيل ولكن بستايل أنظف) */
        .hero-banner-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 300px;
            z-index: 0;
            opacity: 0.15;
            mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
        }
        .hero-banner-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(8px);
        }

        /* الناف بار العلوي */
        .top-nav {
            position: fixed;
            top: 0; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            background: linear-gradient(to bottom, #0f141e 50%, transparent);
        }

        .icon-btn {
            width: 38px; height: 38px;
            border-radius: 10px;
            background-color: #1e1b24;
            border: 1px solid #2d2433;
            color: #ffffff;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; cursor: pointer;
            transition: 0.3s;
        }
        .icon-btn:hover { background-color: #2d2433; }

        /* العناوين الموحدة */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin: 25px 0 12px 0;
            color: #ffffff;
        }

        /* كارت البوستر والعنوان الأساسي */
        .header-info-card {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: flex-start;
        }

        .poster-box {
            width: 110px;
            flex-shrink: 0;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d2433;
            background-color: #1e1b24;
        }
        .poster-box img { width: 100%; display: block; }

        .title-box {
            flex-grow: 1;
            padding-top: 5px;
        }

        .manga-title {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 8px 0;
            line-height: 1.3;
        }

        .status-badge {
            display: inline-block;
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* بطاقة الإحصائيات العلوية (من صفحة الإحصائيات) */
        .top-stats-card {
            background-color: #1e1b24;
            border: 1px solid #2d2433;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            padding: 15px 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .divider {
            width: 1px;
            background-color: #2d2433;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .stat-label {
            font-size: 11px;
            color: #a0a0a0;
        }

        /* ألوان النصوص المخصصة (من صفحة الإحصائيات) */
        .purple-text { color: #a855f7; }
        .orange-text { color: #f97316; }
        .blue-text { color: #3b82f6; }
        .yellow-text { color: #eab308; }

        /* نظام التقييم التفاعلي */
        .interactive-rating-card {
            background-color: #1a2235;
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .stars-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stars { display: flex; flex-direction: row-reverse; gap: 4px; }
        .stars i { color: #2d3748; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .stars i:hover, .stars i:hover ~ i { color: #eab308; transform: scale(1.1); }
        .stars i.active { color: #eab308; }
        
        .rating-num { font-weight: 700; font-size: 16px; color: #eab308; }
        .rating-hint { font-size: 11px; color: #64748b; }

        /* التصنيفات (حسب النوع) */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .tag {
            background-color: #1a202c;
            border: 1px solid #2d3748;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            color: #cbd5e1;
        }

        /* أزرار التحكم */
        .action-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px; 
            border-radius: 10px; 
            font-size: 14px; 
            font-weight: 700;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            border: none; 
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
        }
        
        .btn-read {
            background-color: #3b82f6; /* لون أزرق يتماشى مع الستايل */
            color: white;
        }
        .btn-read:hover { background-color: #2563eb; }
        
        .btn-fav {
            background-color: #1e1b24;
            border: 1px solid #2d2433;
            color: white;
        }
        .btn-fav:hover { background-color: rgba(244, 63, 94, 0.1); color: #f43f5e; border-color: #f43f5e; }

        /* القصة (نفس ستايل بطاقة حسب النوع) */
        .type-stats-card {
            background-color: #1a2235;
            border-radius: 12px;
            padding: 15px 20px;
            color: #cbd5e1;
            font-size: 13px;
            line-height: 1.8;
            font-weight: 600;
        }

        /* قائمة الفصول */
        .chapters-list {
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            max-height: 350px; 
            overflow-y: auto; 
            padding-right: 5px;
        }
        
        .chapters-list::-webkit-scrollbar { width: 4px; }
        .chapters-list::-webkit-scrollbar-track { background: #0f141e; }
        .chapters-list::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 10px; }

        .chapter-card {
            background-color: #1a202c;
            border: 1px solid #2d3748;
            padding: 12px 15px;
            border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .chapter-card:hover {
            border-color: #a855f7;
            background-color: rgba(168, 85, 247, 0.05);
        }
        .chap-info { display: flex; flex-direction: column; gap: 3px; }
        .chap-num { font-weight: 700; font-size: 14px; color: #e2e8f0; }
        .chap-date { font-size: 11px; color: #64748b; }
        
        .play-icon {
            width: 28px; height: 28px; 
            border-radius: 8px; 
            background-color: #2d3748;
            display: flex; align-items: center; justify-content: center; 
            color: #94a3b8;
            font-size: 12px;
        }
        .chapter-card:hover .play-icon { background-color: #a855f7; color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body class="stats-body">

    <div class="hero-banner-bg">
        <img id="bg" src="" alt="">
    </div>

    <nav class="top-nav">
        <div class="icon-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></div>
        <div class="icon-btn" onclick="share()"><i class="fas fa-share-alt"></i></div>
    </nav>

    <div class="stats-container">
        
        <div class="header-info-card">
            <div class="poster-box">
                <img id="poster" src="" alt="Poster">
            </div>
            <div class="title-box">
                <div class="status-badge" id="status-badge"><i class="fas fa-bolt"></i> مستمر</div>
                <h1 id="title" class="manga-title">جاري التحميل...</h1>
            </div>
        </div>

        <div class="top-stats-card">
            <div class="stat-item">
                <span class="stat-value blue-text" id="views-count">0</span>
                <span class="stat-label">مشاهدة</span>
            </div>
            <div class="divider"></div>
            <div class="stat-item">
                <span class="stat-value purple-text" id="chapters-count">0</span>
                <span class="stat-label">فصل متاح</span>
            </div>
            <div class="divider"></div>
            <div class="stat-item">
                <span class="stat-value orange-text" id="rating-display-top">0.0</span>
                <span class="stat-label">متوسط التقييم</span>
            </div>
        </div>

        <div class="interactive-rating-card">
            <div class="stars-wrapper">
                <span class="rating-num" id="rating-display">0.0</span>
                <div class="stars" id="star-container"></div>
            </div>
            <span class="rating-hint">اضغط للتقييم</span>
        </div>

        <div id="genres" class="tags-container"></div>

        <div class="action-grid">
            <button class="btn btn-read" id="readBtn">
                <i class="fas fa-book-open"></i> اقرأ الفصل الأول
            </button>
            <button class="btn btn-fav" onclick="toggleFav(this)">
                <i class="far fa-heart"></i> حفظ
            </button>
        </div>

        <h2 class="section-title">القصة</h2>
        <div class="type-stats-card" id="desc">
            ...
        </div>

        <div class="chapters-section">
            <h2 class="section-title">قائمة الفصول</h2>
            <div class="chapters-list" id="chapters-list">
                </div>
        </div>

    </div>

    <script>
    let dataAll = [];

    // 1. دالة عرض قائمة الفصول
    function renderChapters(manga) {
        const chaptersContainer = document.getElementById('chapters-list');
        const chaptersSection = document.querySelector('.chapters-section');
        
        if (!manga.chapters_count || manga.chapters_count == 0) {
            chaptersSection.classList.add('hidden'); 
            return;
        }

        chaptersSection.classList.remove('hidden');
        let html = '';
        for(let i = manga.chapters_count; i >= 1; i--) {
            html += `
                <div class="chapter-card" onclick="openChapter(${manga.id}, ${i})">
                    <div class="chap-info">
                        <span class="chap-num">الفصل ${i}</span>
                        <span class="chap-date">متوفر الآن</span>
                    </div>
                    <div class="play-icon"><i class="fas fa-play"></i></div>
                </div>`;
        }
        chaptersContainer.innerHTML = html;
    }

    // 2. دالة تشغيل الصفحة وجلب البيانات
    async function init(){
        try {
            const res = await fetch('data.json');
            const data = await res.json();
            dataAll = data.mangas;

            const id = new URLSearchParams(location.search).get('id') || dataAll[0]?.id; 
            const m = dataAll.find(x => x.id == id);

            if(!m) {
                document.getElementById('title').innerText = "العمل غير متوفر";
                return;
            }

            // تحديث البيانات في الصفحة
            document.getElementById('bg').src = m.image_url;
            document.getElementById('poster').src = m.image_url;
            document.getElementById('title').innerText = m.title;
            document.getElementById('desc').innerText = m.description || "لا يوجد وصف حالياً.";
            
            // تحديث الحالة
            const statusBadge = document.getElementById('status-badge');
            statusBadge.innerHTML = `<i class="fas fa-bolt"></i> ${m.status || 'مستمر'}`;

            // تحديث الإحصائيات السريعة
            document.getElementById('chapters-count').innerText = m.chapters_count || 0;

            let views = m.views || 0;
            let formattedViews = views >= 1000 ? (views/1000).toFixed(1) + 'K' : views;
            document.getElementById('views-count').innerText = formattedViews;

            // التصنيفات
            if(m.genre) {
                let genreList = m.genre.includes('•') ? m.genre.split('•') : m.genre.split(',');
                document.getElementById('genres').innerHTML =
                    genreList.map(g => `<span class="tag">${g.trim()}</span>`).join('');
            }

            // التقييم والفصول
            setupInteractiveRating(m.rating || "0");
            renderChapters(m); 

            // رابط البوت
            document.getElementById('readBtn').onclick = () => {
                window.location.href = `https://t.me/${data.bot_username}?start=m${m.id}`;
            };

        } catch (error) {
            console.error("خطأ في التحميل:", error);
        }
    }

    // إعداد التقييم
    function setupInteractiveRating(initialRating) {
        const container = document.getElementById('star-container');
        document.getElementById('rating-display').innerText = initialRating;
        document.getElementById('rating-display-top').innerText = initialRating;
        
        let html = '';
        for(let i = 5; i >= 1; i--) {
            const isActive = (initialRating / 2) >= i ? 'active' : ''; 
            html += `<i class="fas fa-star ${isActive}" data-value="${i}" onclick="rateManga(${i})"></i>`;
        }
        container.innerHTML = html;
    }

    function rateManga(val) {
        const newRating = (val * 2).toFixed(1);
        document.getElementById('rating-display').innerText = newRating;
        document.getElementById('rating-display-top').innerText = newRating;
        
        // تحديث ألوان النجوم
        const stars = document.querySelectorAll('.stars i');
        stars.forEach(star => {
            if (parseInt(star.getAttribute('data-value')) <= val) {
                star.classList.add('active');
            } else {
                star.classList.remove('active');
            }
        });
        
        alert(`شكراً لتقييمك: ${newRating}`);
    }

    // زر الحفظ والمفضلة
    function toggleFav(btn) {
        const icon = btn.querySelector('i');
        icon.classList.toggle('far');
        icon.classList.toggle('fas');
        
        if(icon.classList.contains('fas')) {
            btn.style.backgroundColor = 'rgba(244, 63, 94, 0.1)';
            btn.style.color = '#f43f5e';
            btn.style.borderColor = '#f43f5e';
        } else {
            btn.style.backgroundColor = '#1e1b24';
            btn.style.color = 'white';
            btn.style.borderColor = '#2d2433';
        }
    }

    // المشاركة
    function share() {
        if (navigator.share) {
            navigator.share({ title: document.title, url: window.location.href });
        } else {
            alert("تم نسخ الرابط!");
        }
    }

    // فتح الفصل
    function openChapter(mangaId, chapterNum) {
        alert(`جاري فتح الفصل ${chapterNum}`);
    }

    // تشغيل التطبيق
    init();
    </script>
</body>
</html>
