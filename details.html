<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل العمل | Ultimate VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --bg-main: #07070a;
        --bg-card: #13131a;
        --primary: #6d28d9;
        --primary-glow: rgba(109, 40, 217, 0.5);
        --accent: #f59e0b;
        --text-main: #ffffff;
        --text-muted: #8b8b99;
        --glass: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

    body {
        background-color: var(--bg-main);
        color: var(--text-main);
        overflow-x: hidden;
    }

    .top-nav {
        position: fixed;
        top: 0; width: 100%;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        z-index: 100;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }

    .hidden { display: none !important; }

    .icon-btn {
        width: 40px; height: 40px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        color: white;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; cursor: pointer;
        transition: 0.3s;
    }
    .icon-btn:hover { background: var(--primary); transform: scale(1.1); }

    .hero-banner { position: relative; height: 50vh; width: 100%; }
    .hero-banner img { width: 100%; height: 100%; object-fit: cover; filter: blur(5px) brightness(0.3); }
    .hero-banner::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(0deg, var(--bg-main) 0%, transparent 100%);
    }

    .content-wrapper {
        position: relative; z-index: 10; margin-top: -150px;
        padding: 0 20px 40px; max-width: 900px; margin-inline: auto;
    }

    .meta-header { display: flex; gap: 25px; align-items: flex-end; margin-bottom: 30px; }
    
    .poster-container {
        flex-shrink: 0; width: 160px; border-radius: 12px; overflow: hidden;
        border: 2px solid var(--border); box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px var(--primary-glow);
    }
    .poster-container img { width: 100%; display: block; }

    .meta-info { flex-grow: 1; padding-bottom: 10px; }
    
    .status-badge {
        display: inline-block; background: rgba(16, 185, 129, 0.2); color: #10b981;
        padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 800;
        margin-bottom: 10px; border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .manga-title { font-size: 32px; font-weight: 900; line-height: 1.2; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

    .quick-stats { display: flex; gap: 20px; margin-top: 15px; color: var(--text-muted); font-size: 14px; font-weight: 600; }
    .quick-stats i { color: var(--primary); margin-left: 5px; }

    .interactive-rating {
        margin-top: 15px; display: flex; align-items: center; gap: 10px;
        background: var(--bg-card); padding: 10px 15px; border-radius: 12px;
        border: 1px solid var(--border); width: fit-content;
    }
    .stars { display: flex; flex-direction: row-reverse; gap: 5px; }
    .stars i { color: #333; font-size: 22px; cursor: pointer; transition: 0.2s; }
    .stars i:hover, .stars i:hover ~ i { color: var(--accent); text-shadow: 0 0 10px var(--accent); transform: scale(1.1); }
    .stars i.active { color: var(--accent); }
    .rating-text { font-weight: 800; font-size: 16px; color: var(--accent); }

    .tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 25px; }
    .tag { background: var(--glass); border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; color: #ddd; }

    /* 🔥 تصميم قائمة اختيار حالة القراءة */
    .status-selector-container { margin-top: 20px; }
    .status-select {
        width: 100%; padding: 12px; border-radius: 10px; background: var(--bg-card);
        color: white; border: 1px solid var(--border); font-family: 'Cairo', sans-serif;
        font-weight: 700; font-size: 15px; cursor: pointer; outline: none;
    }
    .status-select:focus { border-color: var(--primary); }
    .status-select option { background: var(--bg-main); color: white; }

    .action-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin: 20px 0 30px; }
    .btn {
        padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 800;
        cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        border: none; color: white; transition: 0.3s;
    }
    .btn-read { background: var(--primary); box-shadow: 0 8px 25px var(--primary-glow); }
    .btn-read:hover { background: #5b21b6; transform: translateY(-3px); }
    .btn-fav { background: var(--glass); border: 1px solid var(--border); }
    .btn-fav:hover { background: rgba(239, 68, 68, 0.2); color: #ef4444; border-color: #ef4444; }

    .section-title { font-size: 20px; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    .section-title::before { content: ''; width: 4px; height: 20px; background: var(--primary); border-radius: 4px; }
    .desc-text { color: var(--text-muted); line-height: 1.8; font-size: 15px; font-weight: 600; background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }

    .chapters-section { margin-top: 40px; }
    .chapters-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
    .chapters-list::-webkit-scrollbar { width: 6px; }
    .chapters-list::-webkit-scrollbar-track { background: var(--bg-main); }
    .chapters-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    .chapter-card {
        background: var(--glass); border: 1px solid var(--border); padding: 15px 20px;
        border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
        transition: 0.3s; cursor: pointer;
    }
    .chapter-card:hover { background: rgba(109, 40, 217, 0.1); border-color: var(--primary); transform: translateX(-5px); }
    
    /* تصميم للفصل المقروء */
    .chapter-card.read-chapter {
        background: rgba(255, 255, 255, 0.01); border-color: rgba(255, 255, 255, 0.05); opacity: 0.6;
    }
    .chapter-card.read-chapter .chap-num { color: #8b8b99; text-decoration: line-through; }
    .chapter-card.read-chapter .play-icon { background: #333; }

    .chap-num { font-weight: 800; font-size: 16px; color: white; }
    .chap-date { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .play-icon { width: 35px; height: 35px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; }

    @media (max-width: 600px) {
        .meta-header { flex-direction: column; align-items: center; text-align: center; }
        .quick-stats { justify-content: center; }
        .interactive-rating { margin: 15px auto; }
        .tags-container { justify-content: center; }
    }
</style>
</head>
<body>

<nav class="top-nav">
    <div class="icon-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></div>
    <div class="icon-btn" onclick="share()"><i class="fas fa-share-alt"></i></div>
</nav>

<div class="hero-banner">
    <img id="bg" src="" alt="Background">
</div>

<div class="content-wrapper">
    
    <div class="meta-header">
        <div class="poster-container">
            <img id="poster" src="" alt="Poster">
        </div>
        <div class="meta-info">
            <div class="status-badge"><i class="fas fa-bolt"></i> مستمر</div>
            <h1 id="title" class="manga-title">جاري التحميل...</h1>
            
            <div class="quick-stats">
                <span id="views-count"><i class="fas fa-eye"></i> 0 مشاهدة</span>
                <span><i class="fas fa-list"></i> <span id="chapters-count">0</span> فصل</span>
            </div>

            <div class="interactive-rating">
                <span class="rating-text" id="rating-display">0.0</span>
                <div class="stars" id="star-container"></div>
                <span style="font-size: 12px; color: var(--text-muted);">(قيم الآن)</span>
            </div>
        </div>
    </div>

    <div id="genres" class="tags-container"></div>

    <!-- قائمة اختيار حالة القراءة -->
    <div class="status-selector-container">
        <select class="status-select" id="reading-status" onchange="updateStatus(this.value)">
            <option value="none">أضف إلى مكتبتي (اختر الحالة)...</option>
            <option value="reading">📖 قيد القراءة</option>
            <option value="planned">📅 مخطط لقرائته</option>
            <option value="completed">✅ مكتمل</option>
            <option value="paused">⏸️ متوقف مؤقتاً</option>
        </select>
    </div>

    <div class="action-grid">
        <button class="btn btn-read" id="readBtn">
            <i class="fas fa-book-open"></i> اقرأ الفصل الأول
        </button>
        <button class="btn btn-fav" onclick="toggleFav(this)">
            <i class="far fa-heart"></i> حفظ
        </button>
    </div>

    <h3 class="section-title">القصة</h3>
    <div class="desc-text" id="desc">...</div>

    <div class="chapters-section">
        <h3 class="section-title">قائمة الفصول</h3>
        <div class="chapters-list" id="chapters-list"></div>
    </div>

</div>

<script>
let currentMangaId = null;
let currentMangaData = null;
let userStats = JSON.parse(localStorage.getItem('myMangaStats')) || {};

// تحديد نوع العمل (مانجا، مانهوا، مانها) لحفظه في الإحصائيات
function determineType(genresText) {
    if (!genresText) return 'manga'; // افتراضي
    if (genresText.includes('مانهوا') && !genresText.includes('صينية')) return 'manhwa';
    if (genresText.includes('صينية') || genresText.includes('مانها')) return 'manhua';
    return 'manga';
}

// إنشاء ملف بيانات للعمل الحالي إذا لم يكن موجوداً
function initUserMangaData() {
    if (!userStats[currentMangaId]) {
        userStats[currentMangaId] = {
            id: currentMangaId,
            type: determineType(currentMangaData.genre),
            status: 'none',
            rating: 0,
            readChapters:[]
        };
    }
}

// حفظ البيانات في المتصفح
function saveStats() {
    localStorage.setItem('myMangaStats', JSON.stringify(userStats));
}

// دالة تحديث حالة القراءة (مكتمل، قيد القراءة...)
function updateStatus(statusValue) {
    initUserMangaData();
    userStats[currentMangaId].status = statusValue;
    saveStats();
    if(statusValue !== 'none') alert("تم تحديث حالة القراءة في إحصائياتك!");
}

// دالة التقييم وتحديثه
function rateManga(val) {
    initUserMangaData();
    const newRating = (val * 2).toFixed(1);
    document.getElementById('rating-display').innerText = newRating;
    
    // حفظ التقييم محلياً
    userStats[currentMangaId].rating = parseFloat(newRating);
    saveStats();

    // تحديث النجوم بصرياً
    setupInteractiveRating(newRating);
    alert(`شكراً لتقييمك: ${newRating} تم حفظه في إحصائياتك!`);
}

// دالة بناء النجوم
function setupInteractiveRating(currentRating) {
    const container = document.getElementById('star-container');
    document.getElementById('rating-display').innerText = currentRating > 0 ? currentRating : "0.0";
    let html = '';
    for(let i = 5; i >= 1; i--) {
        const isActive = (currentRating / 2) >= i ? 'active' : ''; 
        html += `<i class="fas fa-star ${isActive}" data-value="${i}" onclick="rateManga(${i})"></i>`;
    }
    container.innerHTML = html;
}

// دالة فتح الفصل
function openChapter(mangaId, chapterNum) {
    initUserMangaData();
    
    // إذا لم يكن الفصل مقروءاً مسبقاً، أضفه للإحصائيات
    if (!userStats[currentMangaId].readChapters.includes(chapterNum)) {
        userStats[currentMangaId].readChapters.push(chapterNum);
        
        // إذا كان يقرأ لأول مرة، غير الحالة تلقائياً إلى "قيد القراءة"
        if (userStats[currentMangaId].status === 'none' || userStats[currentMangaId].status === 'planned') {
            userStats[currentMangaId].status = 'reading';
            document.getElementById('reading-status').value = 'reading';
        }
        saveStats();
    }

    // تلوين الفصل لجعله "مقروء"
    document.getElementById(`chap-card-${chapterNum}`).classList.add('read-chapter');
    
    alert(`جاري فتح الفصل ${chapterNum}`);
    // window.location.href = `https://t.me/YOUR_BOT?start=m${mangaId}_ch${chapterNum}`;
}

// دالة عرض الفصول
function renderChapters(manga) {
    const chaptersContainer = document.getElementById('chapters-list');
    const chaptersSection = document.querySelector('.chapters-section');
    
    if (!manga.chapters_count || manga.chapters_count == 0) {
        chaptersSection.classList.add('hidden'); 
        return;
    }

    chaptersSection.classList.remove('hidden');
    let html = '';
    const readChaps = userStats[currentMangaId]?.readChapters ||[];

    for(let i = manga.chapters_count; i >= 1; i--) {
        const isRead = readChaps.includes(i) ? 'read-chapter' : '';
        html += `
            <div class="chapter-card ${isRead}" id="chap-card-${i}" onclick="openChapter(${manga.id}, ${i})">
                <div><div class="chap-num">الفصل ${i}</div><div class="chap-date">متوفر الآن</div></div>
                <div class="play-icon"><i class="fas fa-play"></i></div>
            </div>`;
    }
    chaptersContainer.innerHTML = html;
}

// الدالة الأساسية لتشغيل الصفحة
async function init(){
    try {
        const res = await fetch('data.json');
        const data = await res.json();
        const dataAll = data.mangas;

        currentMangaId = new URLSearchParams(location.search).get('id') || dataAll[0]?.id; 
        currentMangaData = dataAll.find(x => x.id == currentMangaId);

        if(!currentMangaData) {
            document.getElementById('title').innerText = "العمل غير متوفر";
            return;
        }

        // استرجاع بيانات المستخدم إذا كان قد دخل لهذه الصفحة مسبقاً
        let userMangaRecord = userStats[currentMangaId];

        document.getElementById('bg').src = currentMangaData.image_url;
        document.getElementById('poster').src = currentMangaData.image_url;
        document.getElementById('title').innerText = currentMangaData.title;
        document.getElementById('desc').innerText = currentMangaData.description || "لا يوجد وصف حالياً.";
        
        document.querySelector('.status-badge').innerHTML = `<i class="fas fa-bolt"></i> ${currentMangaData.status || 'مستمر'}`;
        document.getElementById('chapters-count').innerText = currentMangaData.chapters_count || 0;

        let views = currentMangaData.views || 0;
        let formattedViews = views >= 1000 ? (views/1000).toFixed(1) + 'K' : views;
        document.getElementById('views-count').innerHTML = `<i class="fas fa-eye"></i> ${formattedViews} مشاهدة`;

        if(currentMangaData.genre) {
            let genreList = currentMangaData.genre.includes('•') ? currentMangaData.genre.split('•') : currentMangaData.genre.split(',');
            document.getElementById('genres').innerHTML = genreList.map(g => `<span class="tag">${g.trim()}</span>`).join('');
        }

        // وضع حالة القراءة المخزنة مسبقاً في القائمة المنسدلة
        if (userMangaRecord && userMangaRecord.status) {
            document.getElementById('reading-status').value = userMangaRecord.status;
        }

        // التقييم (إذا كان المستخدم قيمه مسبقاً، نظهر تقييمه، وإلا نظهر التقييم العام)
        let displayRating = userMangaRecord && userMangaRecord.rating > 0 ? userMangaRecord.rating : (currentMangaData.rating || 0);
        setupInteractiveRating(displayRating);
        
        // بناء الفصول (وتلوين المقروء منها)
        renderChapters(currentMangaData); 

        document.getElementById('readBtn').onclick = () => {
            // نعتبر أنه فتح الفصل الأول للإحصائيات
            openChapter(currentMangaData.id, 1); 
            window.location.href = `https://t.me/${data.bot_username}?start=m${currentMangaData.id}`;
        };

    } catch (error) {
        console.error("خطأ في التحميل:", error);
    }
}

function toggleFav(btn) {
    const icon = btn.querySelector('i');
    icon.classList.toggle('far');
    icon.classList.toggle('fas');
    btn.style.color = icon.classList.contains('fas') ? '#ef4444' : 'white';
}

function share() {
    if (navigator.share) {
        navigator.share({ title: document.title, url: window.location.href });
    } else {
        alert("تم نسخ الرابط!");
    }
}

init();
</script>

</body>
</html>
