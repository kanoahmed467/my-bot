<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل العمل | إحصائياتي ستايل</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');

        body.stats-body {
            background-color: #0f141e;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
        }

        .stats-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 80px;
        }

        /* شريط التنقل العلوي البسيط */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .nav-btn {
            background-color: #1a2235;
            border: 1px solid #2d3748;
            color: #e2e8f0;
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            text-decoration: none;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin: 20px 0 10px 0;
        }

        /* كارت المعلومات الأساسية (نفس ستايل الكروت) */
        .info-card {
            background-color: #1a2235;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            border: 1px solid #2d3748;
        }

        .info-poster {
            width: 90px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #1e1b24;
        }

        .info-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 5px 0;
            color: #f1f5f9;
        }

        .info-author {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        /* كارت الإحصائيات العلوية (نسخ لصق من الإحصائيات) */
        .top-stats-card {
            background-color: #1e1b24;
            border: 1px solid #2d2433;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            padding: 20px 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .divider { width: 1px; background-color: #333; }
        .stat-value { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: #a0a0a0; }

        .red-text { color: #f43f5e; }
        .purple-text { color: #a855f7; }
        .orange-text { color: #f97316; }
        .blue-text { color: #3b82f6; }
        .green-text { color: #10b981; }

        /* شبكة حالة القراءة (لقائمتي) */
        .reading-status-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .status-card {
            border-radius: 10px;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a202c;
            border: 1px solid #2d3748;
            cursor: pointer;
            transition: 0.2s;
        }

        .status-card i { font-size: 18px; margin-bottom: 5px; }
        .status-label { font-size: 11px; color: #cbd5e1; text-align: center;}

        /* الألوان عند التفعيل (Active) */
        .status-card.purple-card.active { border-color: #a855f7; background-color: rgba(168, 85, 247, 0.15); color: #a855f7; }
        .status-card.orange-card.active { border-color: #f97316; background-color: rgba(249, 115, 22, 0.15); color: #f97316; }
        .status-card.blue-card.active { border-color: #3b82f6; background-color: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .status-card.green-card.active { border-color: #10b981; background-color: rgba(16, 185, 129, 0.15); color: #10b981; }

        /* بطاقة حسب النوع (للقصة، التصنيفات، الفصول) */
        .type-stats-card {
            background-color: #1a2235;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        .type-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2d3748;
        }
        .type-item:last-child { border-bottom: none; padding-bottom: 0; }
        .type-item:first-child { padding-top: 0; }

        .type-name {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #e2e8f0;
            font-weight: 600;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; margin-left: 10px; }
        .red-dot { background-color: #f43f5e; }
        .blue-dot { background-color: #3b82f6; }
        .yellow-dot { background-color: #eab308; }
        .green-dot { background-color: #10b981; }

        .type-value { color: #94a3b8; font-size: 14px; }

        /* التقييم التفاعلي داخل بطاقة */
        .stars-container { display: flex; flex-direction: row-reverse; gap: 5px; }
        .stars-container i { color: #2d3748; font-size: 20px; cursor: pointer; }
        .stars-container i.active, .stars-container i:hover, .stars-container i:hover ~ i { color: #eab308; }

        /* وصف القصة */
        .story-text {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.8;
            margin: 0;
        }

        /* قائمة الفصول التفاعلية */
        .chapter-row {
            cursor: pointer;
            transition: 0.2s;
        }
        .chapter-row:hover { background-color: rgba(255,255,255,0.02); }
        .chapter-read { color: #10b981 !important; }

        /* زر القراءة */
        .read-btn {
            width: 100%;
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
    </style>
</head>
<body class="stats-body">

    <div class="stats-container">
        
        <div class="top-nav">
            <div class="nav-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></div>
            <h1 class="page-title">التفاصيل</h1>
            <div class="nav-btn" onclick="share()"><i class="fas fa-share-alt"></i></div>
        </div>

        <div class="info-card">
            <img id="poster" src="" alt="Poster" class="info-poster">
            <div class="info-details">
                <h2 id="title" class="info-title">جاري التحميل...</h2>
                <span class="info-author" id="status-text">مستمر</span>
                <span class="info-author" id="type-text">مانجا</span>
            </div>
        </div>

        <div class="top-stats-card">
            <div class="stat-item">
                <span class="stat-value blue-text" id="views-count">0</span>
                <span class="stat-label">مشاهدة</span>
            </div>
            <div class="divider"></div>
            <div class="stat-item">
                <span class="stat-value purple-text" id="chapters-count">0</span>
                <span class="stat-label">فصل</span>
            </div>
            <div class="divider"></div>
            <div class="stat-item">
                <span class="stat-value orange-text" id="rating-display">0.0</span>
                <span class="stat-label">التقييم</span>
            </div>
        </div>

        <h2 class="section-title">إضافة لقائمتي</h2>
        <div class="reading-status-grid">
            <div class="status-card purple-card" onclick="setStatus('planned')" id="btn-planned">
                <i class="fas fa-bookmark"></i>
                <span class="status-label">مخطط</span>
            </div>
            <div class="status-card orange-card" onclick="setStatus('paused')" id="btn-paused">
                <i class="fas fa-pause-circle"></i>
                <span class="status-label">متوقف</span>
            </div>
            <div class="status-card blue-card" onclick="setStatus('completed')" id="btn-completed">
                <i class="fas fa-check-circle"></i>
                <span class="status-label">مكتمل</span>
            </div>
            <div class="status-card green-card" onclick="setStatus('reading')" id="btn-reading">
                <i class="fas fa-book-reader"></i>
                <span class="status-label">قيد القراءة</span>
            </div>
        </div>

        <button class="read-btn" id="readBtn">
            <i class="fas fa-book-open"></i> ابدأ القراءة الآن
        </button>

        <h2 class="section-title">معلومات إضافية</h2>
        <div class="type-stats-card">
            <div class="type-item">
                <div class="type-name"><span class="dot yellow-dot"></span> تقييمي الشخصي</div>
                <div class="stars-container" id="my-rating-stars">
                    </div>
            </div>
            <div class="type-item" id="genres-container">
                <div class="type-name"><span class="dot blue-dot"></span> التصنيفات</div>
                <div class="type-value" id="genres">...</div>
            </div>
        </div>

        <h2 class="section-title">القصة</h2>
        <div class="type-stats-card">
            <p class="story-text" id="desc">...</p>
        </div>

        <h2 class="section-title">الفصول</h2>
        <div class="type-stats-card" id="chapters-list" style="max-height: 300px; overflow-y: auto;">
            </div>

    </div>

    <script>
    let currentMangaData = null;
    let myMangaStats = JSON.parse(localStorage.getItem('myMangaStats')) || {};
    let currentMangaId = new URLSearchParams(location.search).get('id');

    // دالة لتحديث واجهة "قائمتي" (تحديد الزر النشط)
    function updateStatusUI(status) {
        document.getElementById('btn-planned').classList.remove('active');
        document.getElementById('btn-paused').classList.remove('active');
        document.getElementById('btn-completed').classList.remove('active');
        document.getElementById('btn-reading').classList.remove('active');

        if(status === 'planned') document.getElementById('btn-planned').classList.add('active');
        else if(status === 'paused') document.getElementById('btn-paused').classList.add('active');
        else if(status === 'completed') document.getElementById('btn-completed').classList.add('active');
        else if(status === 'reading') document.getElementById('btn-reading').classList.add('active');
    }

    // دالة لحفظ حالة القراءة (مخطط، متوقف، الخ)
    function setStatus(status) {
        if(!currentMangaData) return;
        
        // إذا لم يكن العمل موجوداً مسبقاً في الإحصائيات، أنشئه
        if (!myMangaStats[currentMangaId]) {
            myMangaStats[currentMangaId] = {
                status: 'none',
                readChapters: [],
                rating: 0,
                type: currentMangaData.type || 'manga' // مهم جداً للإحصائيات
            };
        }
        
        // إذا ضغط على نفس الحالة، قم بإلغائها
        if (myMangaStats[currentMangaId].status === status) {
            myMangaStats[currentMangaId].status = 'none';
            updateStatusUI('none');
        } else {
            myMangaStats[currentMangaId].status = status;
            updateStatusUI(status);
        }

        // حفظ في الـ LocalStorage ليتم قراءته في صفحة الإحصائيات
        localStorage.setItem('myMangaStats', JSON.stringify(myMangaStats));
    }

    // إعداد نجوم التقييم الشخصي
    function setupRatingUI() {
        let userRating = 0;
        if (myMangaStats[currentMangaId] && myMangaStats[currentMangaId].rating) {
            userRating = myMangaStats[currentMangaId].rating;
        }

        const container = document.getElementById('my-rating-stars');
        let html = '';
        for(let i = 5; i >= 1; i--) {
            const isActive = (userRating / 2) >= i ? 'active' : ''; 
            html += `<i class="fas fa-star ${isActive}" onclick="rateManga(${i})"></i>`;
        }
        container.innerHTML = html;
    }

    // حفظ التقييم الشخصي
    function rateManga(val) {
        if (!myMangaStats[currentMangaId]) {
            myMangaStats[currentMangaId] = { status: 'none', readChapters: [], rating: 0, type: currentMangaData.type || 'manga' };
        }
        
        let newRating = val * 2;
        myMangaStats[currentMangaId].rating = newRating;
        localStorage.setItem('myMangaStats', JSON.stringify(myMangaStats));
        
        setupRatingUI(); // تحديث شكل النجوم
    }

    // دالة لتمييز الفصل كمقروء
    function markChapterRead(chapterNum) {
        if (!myMangaStats[currentMangaId]) {
            myMangaStats[currentMangaId] = { status: 'none', readChapters: [], rating: 0, type: currentMangaData.type || 'manga' };
        }

        let readArray = myMangaStats[currentMangaId].readChapters;
        if (!readArray.includes(chapterNum)) {
            readArray.push(chapterNum);
            localStorage.setItem('myMangaStats', JSON.stringify(myMangaStats));
        }

        alert(`تم فتح الفصل ${chapterNum} وإضافته كـ (مقروء) للإحصائيات!`);
        renderChapters(currentMangaData); // تحديث واجهة الفصول
    }

    // عرض قائمة الفصول
    function renderChapters(manga) {
        const chaptersContainer = document.getElementById('chapters-list');
        if (!manga.chapters_count || manga.chapters_count == 0) {
            chaptersContainer.innerHTML = '<div class="type-item"><div class="type-name">لا توجد فصول بعد</div></div>';
            return;
        }

        let readList = [];
        if (myMangaStats[currentMangaId]) {
            readList = myMangaStats[currentMangaId].readChapters || [];
        }

        let html = '';
        for(let i = manga.chapters_count; i >= 1; i--) {
            let isRead = readList.includes(i);
            let readTextClass = isRead ? "type-value chapter-read" : "type-value";
            let readIcon = isRead ? '<i class="fas fa-check"></i> مقروء' : '<i class="fas fa-play"></i>';

            html += `
                <div class="type-item chapter-row" onclick="markChapterRead(${i})">
                    <div class="type-name"><span class="dot ${isRead ? 'green-dot' : 'red-dot'}"></span> الفصل ${i}</div>
                    <div class="${readTextClass}">${readIcon}</div>
                </div>`;
        }
        chaptersContainer.innerHTML = html;
    }

    // جلب البيانات وبدء الصفحة
    async function init() {
        try {
            const res = await fetch('data.json');
            const data = await res.json();
            
            if (!currentMangaId) currentMangaId = data.mangas[0].id;
            
            currentMangaData = data.mangas.find(x => x.id == currentMangaId);

            if(!currentMangaData) {
                document.getElementById('title').innerText = "العمل غير متوفر";
                return;
            }

            // ملء البيانات في الصفحة
            document.getElementById('poster').src = currentMangaData.image_url;
            document.getElementById('title').innerText = currentMangaData.title;
            document.getElementById('status-text').innerText = currentMangaData.status || 'مستمر';
            document.getElementById('type-text').innerText = currentMangaData.type === 'manhwa' ? 'مانهوا' : (currentMangaData.type === 'manhua' ? 'مانهوا صينية' : 'مانجا');
            
            document.getElementById('chapters-count').innerText = currentMangaData.chapters_count || 0;
            document.getElementById('views-count').innerText = (currentMangaData.views >= 1000) ? (currentMangaData.views/1000).toFixed(1) + 'K' : (currentMangaData.views || 0);
            document.getElementById('rating-display').innerText = currentMangaData.rating || "0.0";
            
            document.getElementById('desc').innerText = currentMangaData.description || "لا يوجد وصف حالياً.";

            if(currentMangaData.genre) {
                let genreList = currentMangaData.genre.includes('•') ? currentMangaData.genre.split('•') : currentMangaData.genre.split(',');
                document.getElementById('genres').innerText = genreList.join(' ، ');
            }

            // ضبط حالة العمل السابقة إن وجدت في الإحصائيات
            if (myMangaStats[currentMangaId] && myMangaStats[currentMangaId].status) {
                updateStatusUI(myMangaStats[currentMangaId].status);
            }

            setupRatingUI();
            renderChapters(currentMangaData);

            document.getElementById('readBtn').onclick = () => {
                window.location.href = `https://t.me/${data.bot_username}?start=m${currentMangaData.id}`;
            };

        } catch (error) {
            console.error("خطأ:", error);
        }
    }

    function share() {
        if (navigator.share) navigator.share({ title: document.title, url: window.location.href });
        else alert("تم نسخ الرابط!");
    }

    init();
    </script>
</body>
</html>
