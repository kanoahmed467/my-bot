<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل العمل | Ultimate VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
    :root {
        --bg-main: #07070a;
        --bg-card: #13131a;
        --primary: #6d28d9;
        --primary-glow: rgba(109, 40, 217, 0.5);
        --accent: #f59e0b;
        --text-main: #ffffff;
        --text-muted: #8b8b99;
        --glass: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; }

    /* هيدر ثابت */
    .top-nav {
        position: fixed; top: 0; width: 100%; padding: 20px;
        display: flex; justify-content: space-between; z-index: 100;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }

    .icon-btn {
        width: 40px; height: 40px; border-radius: 50%;
        background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
        border: 1px solid var(--border); color: white;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; cursor: pointer; transition: 0.3s;
    }

    /* البانر */
    .hero-banner { position: relative; height: 50vh; width: 100%; }
    .hero-banner img { width: 100%; height: 100%; object-fit: cover; filter: blur(5px) brightness(0.3); }
    .hero-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, var(--bg-main) 0%, transparent 100%); }

    /* الحاوية الرئيسية */
    .content-wrapper { position: relative; z-index: 10; margin-top: -150px; padding: 0 20px 40px; max-width: 900px; margin-inline: auto; }

    .meta-header { display: flex; gap: 25px; align-items: flex-end; margin-bottom: 30px; }
    .poster-container { flex-shrink: 0; width: 160px; border-radius: 12px; overflow: hidden; border: 2px solid var(--border); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
    .poster-container img { width: 100%; display: block; }

    .manga-title { font-size: 28px; font-weight: 900; line-height: 1.2; }
    .status-badge { display: inline-block; background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 8px; }

    /* ⭐ التقييم */
    .interactive-rating { margin-top: 15px; display: flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border); width: fit-content; }
    .stars i { color: #333; font-size: 20px; cursor: pointer; }
    .stars i.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

    /* 🏷️ القصة مع عرض المزيد */
    .desc-container { position: relative; background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
    .desc-text { color: var(--text-muted); line-height: 1.8; font-size: 15px; overflow: hidden; position: relative; max-height: 100px; transition: max-height 0.4s ease; }
    .desc-text.expanded { max-height: 1000px; }
    
    .desc-fade {
        position: absolute; bottom: 0; left: 0; width: 100%; height: 40px;
        background: linear-gradient(transparent, var(--bg-card));
        pointer-events: none;
    }
    .desc-text.expanded .desc-fade { display: none; }

    .read-more-btn {
        color: var(--primary); font-weight: 800; font-size: 14px; cursor: pointer;
        display: none; margin-top: 10px; text-align: left;
    }

    /* 📚 الفصول */
    .chapters-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
    .chapter-card { background: var(--glass); border: 1px solid var(--border); padding: 15px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    .play-icon { width: 35px; height: 35px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; }

    /* 🚀 قسم أعمال قد تعجبك */
    .suggested-section { margin-top: 40px; }
    .suggested-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
    .suggest-item { cursor: pointer; transition: 0.3s; }
    .suggest-item img { width: 100%; border-radius: 10px; aspect-ratio: 2/3; object-fit: cover; border: 1px solid var(--border); }
    .suggest-item:hover { transform: scale(1.05); }
    .suggest-title { font-size: 12px; font-weight: 700; margin-top: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .hidden { display: none !important; }
    .section-title { font-size: 20px; font-weight: 900; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; }
    .section-title::before { content: ''; width: 4px; height: 20px; background: var(--primary); border-radius: 4px; }

    /* أزرار الأكشن */
    .action-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin: 25px 0; }
    .btn { padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; color: white; }
    .btn-read { background: var(--primary); box-shadow: 0 8px 25px var(--primary-glow); }
    .btn-fav { background: var(--glass); border: 1px solid var(--border); }

    @media (max-width: 600px) {
        .meta-header { flex-direction: column; align-items: center; text-align: center; }
        .suggested-grid { grid-template-columns: repeat(3, 1fr); }
    }
</style>
</head>
<body>

<nav class="top-nav">
    <div class="icon-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></div>
    <div class="icon-btn" onclick="share()"><i class="fas fa-share-alt"></i></div>
</nav>

<div class="hero-banner">
    <img id="bg" src="">
</div>

<div class="content-wrapper">
    <div class="meta-header">
        <div class="poster-container">
            <img id="poster" src="">
        </div>
        <div class="meta-info">
            <div id="status" class="status-badge">...</div>
            <h1 id="title" class="manga-title">جاري التحميل...</h1>
            <div class="interactive-rating">
                <span class="rating-text" id="rating-display">0.0</span>
                <div class="stars" id="star-container"></div>
            </div>
        </div>
    </div>

    <div id="genres" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;"></div>

    <div class="action-grid">
        <button class="btn btn-read" id="readBtn"><i class="fas fa-book-open"></i> اقرأ الآن</button>
        <button class="btn btn-fav" onclick="toggleFav(this)"><i class="far fa-heart"></i> حفظ</button>
    </div>

    <h3 class="section-title">القصة</h3>
    <div class="desc-container">
        <div id="desc" class="desc-text"></div>
        <div id="descFade" class="desc-fade"></div>
        <div id="readMoreBtn" class="read-more-btn" onclick="toggleReadMore()">عرض المزيد...</div>
    </div>

    <div class="chapters-section">
        <h3 class="section-title">قائمة الفصول (<span id="chapters-count">0</span>)</h3>
        <div class="chapters-list" id="chapters-list"></div>
    </div>

    <div class="suggested-section">
        <h3 class="section-title">أعمال قد تعجبك</h3>
        <div class="suggested-grid" id="suggested-grid"></div>
    </div>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand(); // يخلي التطبيق يفتح كامل الشاشة

async function init(){
    try {
        const res = await fetch('data.json');
        const data = await res.json();
        const mangas = data.mangas;

        const id = new URLSearchParams(location.search).get('id') || mangas[0].id;
        const m = mangas.find(x => x.id == id);

        if(!m) return;

        // البيانات الأساسية
        document.getElementById('bg').src = m.image_url;
        document.getElementById('poster').src = m.image_url;
        document.getElementById('title').innerText = m.title;
        document.getElementById('status').innerText = m.status || 'مستمر';
        document.getElementById('chapters-count').innerText = m.chapters_count || 0;
        
        // القصة ومعالجة "عرض المزيد"
        const descEl = document.getElementById('desc');
        descEl.innerText = m.description || "لا يوجد وصف حالياً.";
        setTimeout(() => {
            if (descEl.scrollHeight > 100) {
                document.getElementById('readMoreBtn').style.display = 'block';
            }
        }, 100);

        // التصنيفات
        let genreList = m.genre ? (m.genre.includes('•') ? m.genre.split('•') : m.genre.split(',')) : [];
        document.getElementById('genres').innerHTML = genreList.map(g => `<span style="background:var(--glass); padding:5px 12px; border-radius:15px; font-size:12px; border:1px solid var(--border)">${g.trim()}</span>`).join('');

        // التقييم والفصول
        setupStars(m.rating || 0);
        renderChapters(m);
        renderSuggestions(mangas, m.id);

        document.getElementById('readBtn').onclick = () => {
            window.location.href = `https://t.me/${data.bot_username}?start=m${m.id}`;
        };

    } catch (e) { console.log(e); }
}

function toggleReadMore() {
    const desc = document.getElementById('desc');
    const btn = document.getElementById('readMoreBtn');
    desc.classList.toggle('expanded');
    btn.innerText = desc.classList.contains('expanded') ? 'عرض أقل' : 'عرض المزيد...';
}

function renderChapters(manga) {
    const list = document.getElementById('chapters-list');
    let html = '';
    for(let i = manga.chapters_count; i >= 1; i--) {
        html += `<div class="chapter-card"><div><div style="font-weight:800">الفصل ${i}</div></div><div class="play-icon"><i class="fas fa-play"></i></div></div>`;
    }
    list.innerHTML = html || '<p style="color:var(--text-muted)">لا توجد فصول حالياً</p>';
}

function renderSuggestions(all, currentId) {
    const grid = document.getElementById('suggested-grid');
    // نختار 3 أعمال عشوائية مش هما العمل الحالي
    const filtered = all.filter(x => x.id != currentId).sort(() => 0.5 - Math.random()).slice(0, 3);
    grid.innerHTML = filtered.map(item => `
        <div class="suggest-item" onclick="location.href='?id=${item.id}'">
            <img src="${item.image_url}">
            <div class="suggest-title">${item.title}</div>
        </div>
    `).join('');
}

function setupStars(rating) {
    const display = document.getElementById('rating-display');
    const container = document.getElementById('star-container');
    display.innerText = rating;
    let html = '';
    for(let i=5; i>=1; i--) {
        const active = (rating/2) >= i ? 'active' : '';
        html += `<i class="fas fa-star ${active}" onclick="rate(${i})"></i>`;
    }
    container.innerHTML = html;
}

function rate(v) { 
    document.getElementById('rating-display').innerText = (v*2).toFixed(1);
    setupStars(v*2);
    tg.HapticFeedback.notificationOccurred('success'); // هزّة خفيفة في الموبايل
}

function toggleFav(btn) {
    const icon = btn.querySelector('i');
    icon.classList.toggle('far'); icon.classList.toggle('fas');
    btn.style.color = icon.classList.contains('fas') ? '#ef4444' : 'white';
}

function share() {
    if (navigator.share) navigator.share({title: document.title, url: window.location.href});
}

init();
</script>

</body>
</html>
