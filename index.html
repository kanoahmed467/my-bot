<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kingdom Library Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --surface: #12121a;
            --primary: #8b5cf6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        header {
            position: sticky; top: 0; z-index: 1000; padding: 15px;
            background: rgba(8, 8, 12, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .search-bar {
            width: 100%; padding: 12px 20px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: var(--surface);
            color: white; font-family: 'Cairo'; outline: none; transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }

        /* الشبكة */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; padding: 15px;
        }

        /* الكارت */
.manga-card {
    background: linear-gradient(145deg, #12121a, #0c0c12);
    border-radius: 16px;
    overflow: hidden;
    transition: 0.3s;
    position: relative;
    border: 1px solid rgba(255,255,255,0.05);
}

.manga-card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* صورة */
.poster-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 2 / 3;
}

.poster-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Gradient فوق الصورة */
.poster-wrapper::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* 🔥 أيقونة الحالة */
.status-dot {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    z-index: 10;
}

/* مستمر */
.dot-releasing {
    background: #10b981;
    animation: pulse-green 1.5s infinite;
}

/* مكتمل */
.dot-completed {
    background: #ef4444;
    animation: pulse-red 1.5s infinite;
}

@keyframes pulse-green {
    0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); }
    70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}

@keyframes pulse-red {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
    70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}

/* محتوى */
.card-content {
    padding: 10px;
}

.manga-name {
    font-size: 13px;
    font-weight: 800;
    line-height: 1.4;
    height: 36px;
    overflow: hidden;
}

/* 🔥 تصنيفات شيك */
.genre-tags {
    margin-top: 6px;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
}

.genre-tag {
    background: rgba(139, 92, 246, 0.15);
    color: #c4b5fd;
    padding: 3px 7px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
}

/* الفوتر */
.manga-info-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
}
    </style>
</head>
<body>

    <header>
        <input type="text" id="searchInput" class="search-bar" placeholder="ابحث عن عملك المفضل..." onkeyup="filterItems()">
    </header>

    <div id="loader" class="shimmer">جاري تجهيز المكتبة... 🏰</div>
    <div id="mangaGrid" class="grid"></div>

    <script>
        let allMangas = [];
        let botUsername = "";

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        async function init() {
            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                allMangas = data.mangas;
                botUsername = data.bot_username;
                document.getElementById('loader').style.display = 'none';
                render(allMangas);
            } catch (e) {
                document.getElementById('loader').innerText = "فشل التحميل ❌";
            }
        }

        function render(items) {
            const grid = document.getElementById('mangaGrid');
            grid.innerHTML = '';
            
            items.forEach(m => {
                const isReleasing = m.status.includes('مستمر');
                // تنظيف التصنيفات: نأخذ أول 2 فقط ونمسح أي رموز غريبة
                const cleanGenres = m.genre
    .replace(/[^\w\s,]/g, '') // يشيل الرموز الغريبة
    .split(',')
    .map(g => g.trim())
    .filter(g => g.length > 2)
    .slice(0, 2);

                const card = document.createElement('div');
                card.className = 'manga-card';
                card.onclick = () => window.Telegram.WebApp.openTelegramLink(`https://t.me/${botUsername}?start=m${m.id}`);

                card.innerHTML = `
                    <div class="poster-wrapper">
                       <span class="status-dot ${isReleasing ? 'dot-releasing' : 'dot-completed'}">
    ${isReleasing ? '▶' : '✔'}
</span>
                        <img src="${m.image_url}?v=${Date.now()}" class="poster-img" loading="lazy" onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover'">
                    </div>
                    <div class="card-content">
                        <h3 class="manga-name">${m.title}</h3>
                        <div class="genre-tags">
                            ${cleanGenres.map(g => `<span class="genre-tag">${g}</span>`).join('')}
                        </div>
                        <div class="manga-info-footer">
                            <span class="rating-box">⭐ ${m.rating}</span>
                            <span style="font-size:10px; color:var(--text-dim)">#${m.id}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterItems() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMangas.filter(m => m.title.toLowerCase().includes(q) || m.genre.toLowerCase().includes(q));
            render(filtered);
        }

        init();
    </script>
</body>
</html>
