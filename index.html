<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kingdom Library Elite</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* 🎨 الألوان المأخوذة من صفحة الإحصائيات */
:root {
    --bg-main: #0f141e;      
    --bg-card: #1a2235;      
    --bg-header: #1e1b24;    
    --border-color: #2d3748; 
    
    --primary: #a855f7;      
    --primary-glow: rgba(168, 85, 247, 0.3);
    
    --green: #10b981;        
    --blue: #3b82f6;         
    --yellow: #eab308;       
    
    --text-main: #ffffff;
    --text-muted: #94a3b8;
    --text-label: #cbd5e1;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    padding-bottom: 70px; /* مساحة لشريط التنقل السفلي */
}

/* =========================================
   🔍 الهيدر والبحث
========================================= */
header {
    position: sticky;
    top: 0;
    z-index: 1000;
    padding: 15px;
    background: rgba(15, 20, 30, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
}

.search-box {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 12px;
    background: var(--bg-header);
    border: 1px solid var(--border-color);
    transition: 0.3s ease;
}

.search-box:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 15px var(--primary-glow);
}

.icon { color: var(--text-muted); font-size: 16px; transition: 0.3s ease; }
.search-box:focus-within .icon { color: var(--primary); }

.search-box input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text-main);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 600;
}

.search-box input::placeholder { color: var(--text-muted); font-weight: 400; }

.clear-btn {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; cursor: pointer;
    color: var(--text-muted);
    opacity: 0; transform: scale(0.7); pointer-events: none;
    transition: 0.3s ease;
}
.clear-btn.show { opacity: 1; transform: scale(1); pointer-events: auto; }
.clear-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }

.search-results {
    position: absolute; width: calc(100% - 30px); left: 15px; top: 70px;
    background: var(--bg-header);
    border-radius: 12px;
    border: 1px solid var(--border-color);
    max-height: 250px; overflow-y: auto;
    display: none; z-index: 1001;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.search-results::-webkit-scrollbar { width: 6px; }
.search-results::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

.result-item {
    display: flex; gap: 12px; padding: 10px 12px;
    cursor: pointer; transition: 0.2s; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.03);
}
.result-item:hover { background: rgba(168, 85, 247, 0.1); }
.result-img { width: 45px; height: 60px; object-fit: cover; border-radius: 8px; }
.result-title { font-size: 13px; font-weight: 700; color: var(--text-main); }
.highlight { color: var(--primary); font-weight: 800; }
.result-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* =========================================
   🎛️ الفلاتر
========================================= */
.filters {
    display: flex; gap: 10px; padding: 15px; overflow-x: auto;
}
.filters::-webkit-scrollbar { display: none; }

.filters button {
    border: 1px solid var(--border-color);
    padding: 8px 16px;
    border-radius: 20px;
    background: var(--bg-card);
    color: var(--text-label);
    font-family: 'Cairo', sans-serif; font-weight: 600; font-size: 13px;
    cursor: pointer; transition: 0.3s;
    white-space: nowrap;
}
.filters button:hover { border-color: var(--primary); }
.filters button.active {
    background: rgba(168, 85, 247, 0.15);
    border-color: var(--primary);
    color: var(--primary);
}

/* =========================================
   📚 شبكة العرض والبطاقات (بدون تصنيفات)
========================================= */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); /* تصغير عرض الكارت قليلاً ليصبح متناسقاً */
    gap: 15px; padding: 0 15px 20px 15px;
}

.card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s ease;
    cursor: pointer;
    display: flex; flex-direction: column;
}

.card:hover {
    transform: translateY(-5px);
    border-color: var(--primary);
    box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 15px var(--primary-glow);
}

.poster {
    width: 100%; aspect-ratio: 2/3;
    position: relative; overflow: hidden;
}

.poster img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s ease;
}
.card:hover .poster img { transform: scale(1.08); }

.status {
    position: absolute; top: 8px; right: 8px;
    padding: 4px 8px; border-radius: 6px;
    font-size: 10px; font-weight: 700;
    backdrop-filter: blur(5px);
    z-index: 2; border: 1px solid rgba(255,255,255,0.1);
}
.live { background: rgba(16, 185, 129, 0.2); color: var(--green); border-color: rgba(16, 185, 129, 0.3); }
.done { background: rgba(59, 130, 246, 0.2); color: var(--blue); border-color: rgba(59, 130, 246, 0.3); }

/* تنسيق المحتوى ليكون أنيق ومختصر */
.content { 
    padding: 12px 10px; 
    flex-grow: 1; 
    display: flex; 
    flex-direction: column; 
    justify-content: space-between; 
    gap: 8px;
}

.title {
    font-size: 13px; font-weight: 700; line-height: 1.4;
    color: var(--text-main);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.meta-footer { display: flex; justify-content: space-between; align-items: center; }
.stars { font-size: 12px; color: var(--yellow); font-weight: 700; display: flex; align-items: center; gap: 4px; }

.loader { text-align: center; padding: 50px 20px; color: var(--text-muted); font-weight: 600; }

/* =========================================
   📱 شريط التنقل السفلي
========================================= */
.bottom-nav {
    position: fixed; bottom: 0; left: 0; width: 100%;
    background: var(--bg-header);
    border-top: 1px solid var(--border-color);
    display: flex; justify-content: space-around; align-items: center;
    padding: 10px 0; z-index: 1000;
    padding-bottom: env(safe-area-inset-bottom, 10px);
}

.nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-muted); text-decoration: none; font-size: 11px; font-weight: 600;
    transition: 0.3s; width: 25%;
}

.nav-item i { font-size: 18px; }
.nav-item.active { color: var(--primary); }
.nav-item:hover { color: var(--text-main); }
</style>
</head>

<body>

<!-- شريط البحث -->
<header>
    <div class="search-box">
        <i class="icon fa-solid fa-magnifying-glass"></i>
        <input id="searchInput" type="text" placeholder="ابحث عن مانجا، مانهوا...">
        <span class="clear-btn" onclick="clearSearch()"><i class="fa-solid fa-xmark"></i></span>
    </div>
    <div id="searchResults" class="search-results"></div>
</header>

<!-- الفلاتر -->
<div class="filters">
    <button class="active" onclick="filter('all', this)">الكل</button>
    <button onclick="filter('مستمر', this)"><span style="color:var(--green)">●</span> مستمر</button>
    <button onclick="filter('مكتمل', this)"><span style="color:var(--blue)">✔</span> مكتمل</button>
</div>

<!-- العرض -->
<div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> جاري جلب البيانات...</div>
<div id="grid" class="grid"></div>

<!-- شريط التنقل -->
<nav class="bottom-nav">
    <a href="#" class="nav-item active">
        <i class="fa-solid fa-house"></i>
        <span>الرئيسية</span>
    </a>
    <a href="statistics.html" class="nav-item">
        <i class="fa-solid fa-chart-simple"></i>
        <span>إحصائياتي</span>
    </a>
</nav>

<script>
let dataAll=[];

if(window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
}

async function init(){
    try {
        const res = await fetch('data.json?v='+Date.now());
        const data = await res.json();
        dataAll = data.mangas;

        document.getElementById('loader').style.display='none';
        render(dataAll);
    } catch(e) {
        document.getElementById('loader').innerHTML = 'حدث خطأ في تحميل البيانات.';
    }
}

// دالة لمعالجة التصنيفات لنتائج البحث المنسدلة فقط
function cleanGenres(g){
    if(!g) return [];
    return g.replace(/[^\w\s,\u0600-\u06FF]/g,'')
    .split(',')
    .map(x=>x.trim())
    .filter(x=>x.length > 2)
    .slice(0, 2);
}

// دالة رسم البطاقات (بدون تصنيفات)
function render(arr){
    let grid = document.getElementById('grid');
    grid.innerHTML = '';

    arr.forEach(m => {
        let live = m.status && m.status.includes('مستمر');
        let rating = m.rating ? parseFloat(m.rating).toFixed(1) : "0.0";

        let card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => { window.location.href = `details.html?id=${m.id}`; };

        card.innerHTML = `
        <div class="poster">
            <div class="status ${live ? 'live' : 'done'}">
                ${live ? 'مستمر' : 'مكتمل'}
            </div>
            <img src="${m.image_url}" loading="lazy" alt="poster">
        </div>
        <div class="content">
            <div class="title">${m.title}</div>
            <div class="meta-footer">
                <div class="stars"><i class="fa-solid fa-star"></i> ${rating}</div>
            </div>
        </div>
        `;
        grid.appendChild(card);
    });
}

function smartSearch(query){
    query = query.toLowerCase();
    let seen = new Set();

    return dataAll.map(m => {
        let title = m.title.toLowerCase();
        let score = 0;

        if(title === query) score += 200;
        if(title.startsWith(query)) score += 120;
        if(title.split(' ').includes(query)) score += 100;
        if(title.includes(query)) score += 40;

        let distance = Math.abs(title.length - query.length);
        score -= distance;
        score += (m.rating || 0) * 2;

        return {...m, score};
    })
    .filter(m => m.score > 10) 
    .sort((a,b) => b.score - a.score)
    .filter(m => {
        if(seen.has(m.title)) return false;
        seen.add(m.title);
        return true;
    });
}

function filter(type, btn){
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if(type === 'all') return render(dataAll);
    render(dataAll.filter(m => m.status && m.status.includes(type)));
}

const input = document.getElementById('searchInput');
const resultsBox = document.getElementById('searchResults');
const clearBtn = document.querySelector('.clear-btn');

input.addEventListener('input', () => {
    let q = input.value.trim().toLowerCase();

    if(q) clearBtn.classList.add('show');
    else clearBtn.classList.remove('show');

    if(!q){
        resultsBox.style.display = 'none';
        render(dataAll);
        return;
    }

    let filtered = smartSearch(q);
    render(filtered); 
    showResults(filtered, q); 
});

function showResults(arr, q){
    if(arr.length === 0){
        resultsBox.innerHTML = `<div class="result-item" style="color:var(--text-muted); justify-content:center;">لا توجد نتائج تطابق بحثك</div>`;
        resultsBox.style.display = 'block';
        return;
    }

    resultsBox.innerHTML = arr.slice(0, 5).map(m => {
        let title = m.title.replace(new RegExp(q, 'gi'), match => `<span class="highlight">${match}</span>`);
        let rating = m.rating ? parseFloat(m.rating).toFixed(1) : "0.0";

        return `
        <div class="result-item" onclick="goTo(${m.id})">
            <img src="${m.image_url}" class="result-img" alt="img">
            <div style="flex:1;">
                <div class="result-title">${title}</div>
                <div class="result-meta">${cleanGenres(m.genre).join(' • ')}</div>
            </div>
            <div style="font-size:11px; color:var(--yellow); font-weight:700;"><i class="fa-solid fa-star"></i> ${rating}</div>
        </div>
        `;
    }).join('');

    resultsBox.style.display = 'block';
}

function goTo(id){
    window.location.href = `details.html?id=${id}`;
}

function clearSearch(){
    input.value = '';
    resultsBox.style.display = 'none';
    clearBtn.classList.remove('show');
    render(dataAll); 
    input.focus();
}

document.addEventListener('click', (e) => {
    if(!e.target.closest('header')){
        resultsBox.style.display = 'none';
    }
});

init();
</script>

</body>
</html>
