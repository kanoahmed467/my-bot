<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>فهرس المملكة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f13; --card: #1c1c24; --accent: #7c3aed; --text: #ffffff; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; }
        
        header { position: sticky; top: 0; background: rgba(15, 15, 19, 0.85); backdrop-filter: blur(12px); padding: 15px 20px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        h1 { margin: 0; font-size: 22px; text-align: center; color: var(--accent); text-shadow: 0 0 10px rgba(124, 58, 237, 0.4); }
        
        .search-box { margin-top: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-family: 'Cairo'; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(124, 58, 237, 0.2); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 20px; }
        
        .card { background: var(--card); border-radius: 16px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .card:active { transform: scale(0.95); }
        
        .cover-wrapper { width: 100%; aspect-ratio: 2/3; display: flex; align-items: center; justify-content: center; position: relative; }
        .cover-initial { font-size: 50px; font-weight: 900; color: rgba(255,255,255,0.8); }
        
        .badge { position: absolute; top: 8px; right: 8px; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .status-releasing { color: #34d399; }
        .status-finished { color: #f87171; }
        
        .info { padding: 12px; }
        .title { font-size: 13px; font-weight: bold; margin: 0 0 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .genres { font-size: 10px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .loader { text-align: center; margin-top: 50px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>🏰 مكتبة المملكة</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن اسم العمل أو التصنيف..." onkeyup="filterMangas()">
        </div>
    </header>

    <div id="loader" class="loader">جاري تحميل الفهرس... ⏳</div>
    <div id="mangaGrid" class="grid"></div>

    <script>
        let allMangas =[];
        let botUsername = "";

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.setHeaderColor('#0f0f13');

        function getGradient(id) {
            const hues =[260, 320, 200, 150, 10, 45, 190];
            const h = hues[id % hues.length];
            return `linear-gradient(135deg, hsl(${h}, 80%, 20%), hsl(${h + 40}, 80%, 10%))`;
        }

        async function init() {
            try {
                // 👈 هنا الصفحة بتقرأ ملف الداتا اللي البوت هيرفعه على جيت هاب!
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();
                allMangas = data.mangas;
                botUsername = data.bot_username;
                
                document.getElementById('loader').style.display = 'none';
                renderMangas(allMangas);
            } catch (err) {
                document.getElementById('loader').innerText = "❌ لم يتم تحديث الفهرس بعد.";
            }
        }

        function renderMangas(mangas) {
            const grid = document.getElementById('mangaGrid');
            grid.innerHTML = '';
            
            mangas.forEach(m => {
                const statusClass = m.status.includes('مستمر') ? 'status-releasing' : 'status-finished';
                const firstLetter = m.title.charAt(0);
                const gradient = getGradient(m.id);

                const card = document.createElement('div');
                card.className = 'card';
                // 👈 الضربة القاضية: فتح المانجا في البوت فوراً
                card.onclick = () => {
                    const deepLink = `https://t.me/${botUsername}?start=m${m.id}`;
                    window.Telegram.WebApp.openTelegramLink(deepLink);
                };

                card.innerHTML = `
                    <div class="cover-wrapper" style="background: ${gradient};">
                        <div class="cover-initial">${firstLetter}</div>
                        <span class="badge ${statusClass}">${m.status}</span>
                    </div>
                    <div class="info">
                        <h3 class="title">${m.title}</h3>
                        <div class="genres">${m.genre}</div>
                        <div class="rating" style="font-size:11px; color:#fbbf24; margin-top:5px; font-weight:bold;">⭐ ${m.rating}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterMangas() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMangas.filter(m => m.title.toLowerCase().includes(query) || m.genre.includes(query));
            renderMangas(filtered);
        }

        init();
    </script>
</body>
</html>
