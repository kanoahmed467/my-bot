<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Library Elite</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#08080c;
    --card:#12121a;
    --primary:#8b5cf6;
    --green:#10b981;
    --red:#ef4444;
    --text:#fff;
    --dim:#94a3b8;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Cairo',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    position:sticky;
    top:0;
    z-index:1000;
    padding:10px;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.7);
}

.search{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#12121a;
    color:#fff;
}

/* FILTER */
.filters{
    display:flex;
    gap:8px;
    padding:10px;
    overflow:auto;
}

.filters button{
    border:none;
    padding:6px 12px;
    border-radius:8px;
    background:#1a1a24;
    color:#fff;
    cursor:pointer;
    transition:.2s;
}
.filters button:hover{
    background:var(--primary);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:12px;
    padding:12px;
    overflow:visible;
}

/* CARD */
.card{
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    transition:0.3s;
    position:relative;
    animation:fadeUp 0.4s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card:hover{
    transform:scale(1.08);
    z-index:50; /* مهم */
}


.grid:hover .card:not(:hover){
    filter: blur(2px) brightness(0.7);
    transition:0.3s;
}

.filters button.active{
    background:var(--primary);
}

/* IMAGE */
.poster {
    width: 100%;
    aspect-ratio: 2/3;
    overflow: hidden; /* مهم */
}

.poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition:0.4s;

}

.card:hover .poster img{
    transform:scale(1.1);
}


.card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:14px;
    opacity:0;
    transition:0.3s;
    box-shadow:0 0 25px var(--primary);
}

.card:hover::before{
    opacity:1;
}



.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.95), transparent 60%);
    opacity:0;
    transition:0.3s;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:8px;
}

.card:hover .overlay{
    opacity:1;
}

.overlay h3{
    font-size:12px;
}

/* status */
.status{
    position:absolute;
    top:8px;
    right:8px;
    width:26px;
    height:26px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:12px;
}

.live{
    background:var(--green);
    animation:pulseG 1.5s infinite;
}
.done{
    background:var(--red);
    animation:pulseR 1.5s infinite;
}

@keyframes pulseG{
0%{box-shadow:0 0 0 0 rgba(16,185,129,.7)}
70%{box-shadow:0 0 0 10px transparent}
100%{box-shadow:0 0 0 0 transparent}
}
@keyframes pulseR{
0%{box-shadow:0 0 0 0 rgba(239,68,68,.7)}
70%{box-shadow:0 0 0 10px transparent}
100%{box-shadow:0 0 0 0 transparent}
}

/* content */
.content{
    padding:8px;
}

.title {
    font-size: 12px;
    font-weight: 800;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.title:hover{
    white-space:normal;
    background:#000;
    position:absolute;
    z-index:10;
    padding:5px;
    border-radius:6px;
}
/* genres */
.genres{
    display:flex;
    flex-wrap:wrap;
    gap:4px;
    margin-top:5px;
}
.tag{
    background:rgba(139,92,246,.2);
    padding:2px 6px;
    border-radius:6px;
    font-size:9px;
}

/* rating */
.stars{
    margin-top:6px;
    font-size:11px;
    color:#fbbf24;
}

/* loader */
.loader{
    text-align:center;
    padding:40px;
    color:var(--primary);
}

@media (hover: none) {
    .overlay {
        opacity: 1;
        background: linear-gradient(to top, rgba(0,0,0,0.9), transparent 70%);
    }
}

</style>
</head>

<body>

<header>
<input class="search" placeholder="🔍 ابحث..." onkeyup="search(this.value)">
</header>

<div class="filters">
<button onclick="filter('all')">الكل</button>
<button onclick="filter('مستمر')">🔥 مستمر</button>
<button onclick="filter('مكتمل')">✔ مكتمل</button>
</div>

<div id="loader" class="loader">جاري التحميل... 🏰</div>
<div id="grid" class="grid"></div>

<script>
let dataAll=[];

Telegram.WebApp.ready();
Telegram.WebApp.expand();

async function init(){
    const res=await fetch('data.json?v='+Date.now());
    const data=await res.json();
    dataAll=data.mangas;
    bot=data.bot_username;

    document.getElementById('loader').style.display='none';
    render(dataAll);
}

function stars(r){
    let full=Math.floor(r/2);
    let s='';
    for(let i=0;i<full;i++) s+='★';
    return s;
}

function cleanGenres(g){
    return g.replace(/[^\w\s,]/g,'')
    .split(',')
    .map(x=>x.trim())
    .filter(x=>x.length>2)
    .slice(0,2);
}

function render(arr){
    let grid=document.getElementById('grid');
    grid.innerHTML='';

    arr.forEach(m=>{
        let live=m.status.includes('مستمر');

        let card=document.createElement('div');
        card.className='card';

        card.onclick=()=>{
            Telegram.WebApp.openTelegramLink(`https://t.me/${bot}?start=m${m.id}`);
        };

        card.innerHTML=`
        <div class="poster">
            <div class="status ${live?'live':'done'}">
                ${live?'▶':'✔'}
            </div>

            <img src="${m.image_url}" decoding="async">

   <div class="overlay">
    <div style="font-size:11px;font-weight:800;line-height:1.3;max-height:32px;overflow:hidden">
        ${m.title}
    </div>
    <div style="font-size:9px;color:#aaa">
        ${cleanGenres(m.genre).join(' • ')}
    </div>
</div>
        </div>

        <div class="content">
            <div class="title">${m.title}</div>

            <div class="genres">
                ${cleanGenres(m.genre).map(g=>`<span class="tag">${g}</span>`).join('')}
            </div>

            <div class="stars">${stars(m.rating)}</div>
        </div>
        `;

        grid.appendChild(card);
    });
}

function search(q){
    q=q.toLowerCase();
    render(dataAll.filter(m=>
        m.title.toLowerCase().includes(q) ||
        m.genre.toLowerCase().includes(q)
    ));
}

function filter(type){
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');

    if(type==='all') return render(dataAll);
    render(dataAll.filter(m=>m.status.includes(type)));
}
init();
</script>

</body>
</html>
