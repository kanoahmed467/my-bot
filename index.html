<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kingdom Library Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --surface: #12121a;
            --primary: #8b5cf6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        header {
            position: sticky; top: 0; z-index: 1000; padding: 15px;
            background: rgba(8, 8, 12, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .search-bar {
            width: 100%; padding: 12px 20px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: var(--surface);
            color: white; font-family: 'Cairo'; outline: none; transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }

        /* الشبكة */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; padding: 15px;
        }

        /* الكارت الجديد */
        .manga-card {
            background: var(--surface); border-radius: 14px; overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.03); position: relative;
        }
        .manga-card:active { transform: scale(0.95); }

        .poster-wrapper {
            position: relative; width: 100%; aspect-ratio: 2 / 3.2; background: #1a1a24;
        }
        .poster-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

        /* أنيميشن النبض للعلامات */
        .status-dot {
            position: absolute; top: 10px; right: 10px;
            padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800;
            color: white; z-index: 10; display: flex; align-items: center; gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        /* تأثير النبض للمستمر */
        .dot-releasing { background: var(--accent-green); animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* تأثير النبض للمكتمل */
        .dot-completed { background: var(--accent-red); animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .card-content { padding: 10px; }
        .manga-name {
            font-size: 14px; font-weight: 700; margin: 0; line-height: 1.3;
            height: 38px; display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }

        /* تنسيق التصنيفات النظيف */
        .genre-tags {
            margin-top: 8px; font-size: 11px; color: var(--text-dim);
            display: flex; gap: 5px; flex-wrap: wrap;
        }
        .genre-tag {
            background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px;
        }

        .manga-info-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px;
        }
        .rating-box { color: #fbbf24; font-weight: 800; font-size: 12px; display: flex; align-items: center; gap: 3px; }

        .shimmer { text-align: center; padding: 50px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <input type="text" id="searchInput" class="search-bar" placeholder="ابحث عن عملك المفضل..." onkeyup="filterItems()">
    </header>

    <div id="loader" class="shimmer">جاري تجهيز المكتبة... 🏰</div>
    <div id="mangaGrid" class="grid"></div>

    <script>
        let allMangas = [];
        let botUsername = "";

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        async function init() {
            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                allMangas = data.mangas;
                botUsername = data.bot_username;
                document.getElementById('loader').style.display = 'none';
                render(allMangas);
            } catch (e) {
                document.getElementById('loader').innerText = "فشل التحميل ❌";
            }
        }

        function render(items) {
            const grid = document.getElementById('mangaGrid');
            grid.innerHTML = '';
            
            items.forEach(m => {
                const isReleasing = m.status.includes('مستمر');
                // تنظيف التصنيفات: نأخذ أول 2 فقط ونمسح أي رموز غريبة
                const cleanGenres = m.genre.split(/[,|/•]+/).map(g => g.trim()).filter(g => g.length > 1).slice(0, 2);

                const card = document.createElement('div');
                card.className = 'manga-card';
                card.onclick = () => window.Telegram.WebApp.openTelegramLink(`https://t.me/${botUsername}?start=m${m.id}`);

                card.innerHTML = `
                    <div class="poster-wrapper">
                        <span class="status-dot ${isReleasing ? 'dot-releasing' : 'dot-completed'}">
                            ${isReleasing ? 'مستمر' : 'مكتمل'}
                        </span>
                        <img src="${m.image_url}?v=${Date.now()}" class="poster-img" loading="lazy" onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover'">
                    </div>
                    <div class="card-content">
                        <h3 class="manga-name">${m.title}</h3>
                        <div class="genre-tags">
                            ${cleanGenres.map(g => `<span class="genre-tag">${g}</span>`).join('')}
                        </div>
                        <div class="manga-info-footer">
                            <span class="rating-box">⭐ ${m.rating}</span>
                            <span style="font-size:10px; color:var(--text-dim)">#${m.id}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterItems() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMangas.filter(m => m.title.toLowerCase().includes(q) || m.genre.toLowerCase().includes(q));
            render(filtered);
        }

        init();
    </script>
</body>
</html>
